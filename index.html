<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #5f7cff, #7b4bb7);
  color: white;
  min-height: 100vh;
}

header {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  background: #2c3e50;
  position: relative;
}

header h3 { margin: 0; }

#logoutBtn {
  position: absolute;
  right: 20px;
  background: red;
  color: white;
  border: none;
  padding: 6px 14px;
  border-radius: 5px;
  cursor: pointer;
  display: none;
  width: auto;
}

h1 { text-align: center; }

.container {
  display: flex;
  justify-content: center;
  margin-top: 30px;
  gap: 30px;
  padding: 0 20px 40px;
}

.box {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 15px;
  width: 350px;
  flex-shrink: 0;
}

.box.wide { width: 620px; }

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #5f7cff;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  transition: background 0.2s;
}

button:hover { background: #4a68e0; }
button:disabled { background: #aaa; cursor: not-allowed; }

.btn-secondary {
  background: #6c757d;
}
.btn-secondary:hover { background: #5a6268; }

.msg {
  margin-top: 8px;
  font-size: 13px;
  min-height: 18px;
  color: #c0392b;
  font-weight: bold;
}

table {
  width: 100%;
  margin-top: 10px;
  border-collapse: collapse;
  font-size: 13px;
}

th, td {
  padding: 9px 8px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

th {
  background: #5f7cff;
  color: white;
}

tr:hover td { background: #f5f5f5; }

.delete-btn {
  background: #e74c3c;
  padding: 5px 10px;
  margin: 0;
  width: auto;
  font-size: 12px;
  border-radius: 5px;
}

.delete-btn:hover { background: #c0392b; }

#welcome {
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  margin: 10px 0 0;
}

#studentCount {
  font-size: 14px;
  color: #555;
  margin-bottom: 4px;
}

@media (max-width: 768px) {
  .container { flex-direction: column; align-items: center; }
  .box, .box.wide { width: 95%; }
}
</style>
</head>
<body>

<header>
  <h3>Dashboard</h3>
  <button id="logoutBtn">Logout</button>
</header>

<h1>STUDENT DASHBOARD</h1>
<p id="welcome"></p>

<div class="container">

  <!-- LEFT BOX -->
  <div class="box">

    <!-- LOGIN/SIGNUP FORM -->
    <div id="loginBox">
      <h3 style="margin-top:0">Login / Signup</h3>
      <input id="username" placeholder="Username" autocomplete="username">
      <input id="password" type="password" placeholder="Password" autocomplete="current-password">
      <button id="loginBtn">Login</button>
      <button id="signupBtn" class="btn-secondary">Signup</button>
      <p class="msg" id="authMsg"></p>
    </div>

    <!-- STUDENT ADD FORM (shown after login) -->
    <div id="studentForm" style="display:none;">
      <p id="studentCount">Total Students: <strong id="count">0</strong></p>
      <h4 style="margin:10px 0 6px">Add Student</h4>
      <input id="name" placeholder="Name">
      <input id="email" placeholder="Email" type="email">
      <input id="branch" placeholder="Branch">
      <input id="phone" placeholder="Phone" type="tel">
      <button id="addBtn">Add Student</button>
      <p class="msg" id="formMsg"></p>
    </div>

  </div>

  <!-- RIGHT BOX -->
  <div class="box wide" id="tableBox" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
      <h3 style="margin:0">Students</h3>
      <input id="search" placeholder="Search by name, email, branch..." style="width:260px; margin:0;">
    </div>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Branch</th>
          <th>Phone</th>
          <th>Date Added</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="studentsBody"></tbody>
    </table>
    <p id="tableMsg" style="text-align:center; color:#888; font-size:13px;"></p>
  </div>

</div>

<script>
/* ── CONFIG ── */
const API = "https://student-app-plus.onrender.com";

/* ── ELEMENT REFS ── */
const loginBox     = document.getElementById("loginBox");
const studentForm  = document.getElementById("studentForm");
const tableBox     = document.getElementById("tableBox");
const logoutBtn    = document.getElementById("logoutBtn");
const welcomeEl    = document.getElementById("welcome");
const countEl      = document.getElementById("count");
const studentsBody = document.getElementById("studentsBody");
const authMsg      = document.getElementById("authMsg");
const formMsg      = document.getElementById("formMsg");
const tableMsg     = document.getElementById("tableMsg");
const searchInput  = document.getElementById("search");

/* ── TOKEN HELPERS ── */
function getToken() { return localStorage.getItem("token"); }
function getUser()  { return localStorage.getItem("user"); }

function saveSession(token, username) {
  localStorage.setItem("token", token);
  localStorage.setItem("user", username);
}

function clearSession() {
  localStorage.removeItem("token");
  localStorage.removeItem("user");
}

/* ── AUTH HEADERS ── */
function authHeaders() {
  return {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + getToken()
  };
}

/* ── SHOW DASHBOARD ── */
function showDashboard(username) {
  loginBox.style.display    = "none";
  studentForm.style.display = "block";
  tableBox.style.display    = "block";
  logoutBtn.style.display   = "block";
  welcomeEl.textContent     = "Welcome, " + username + " 👋";
  loadStudents();
}

/* ── AUTO-LOGIN IF TOKEN EXISTS ── */
window.addEventListener("load", () => {
  const token = getToken();
  const user  = getUser();
  if (token && user) showDashboard(user);
});

/* ── LOGIN ── */
document.getElementById("loginBtn").addEventListener("click", async () => {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  authMsg.textContent = "";

  if (!username || !password) {
    authMsg.textContent = "Please enter username and password.";
    return;
  }

  const btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.textContent = "Logging in...";

  try {
    const res  = await fetch(API + "/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (data.success) {
      saveSession(data.token, data.username || username);
      showDashboard(data.username || username);
    } else {
      authMsg.textContent = data.message || "Invalid username or password.";
    }
  } catch {
    authMsg.textContent = "Cannot reach server. Is Render still spinning up? Try again in 30s.";
  } finally {
    btn.disabled = false;
    btn.textContent = "Login";
  }
});

/* ── SIGNUP ── */
document.getElementById("signupBtn").addEventListener("click", async () => {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  authMsg.textContent = "";

  if (!username || !password) {
    authMsg.textContent = "Please enter username and password.";
    return;
  }
  if (password.length < 6) {
    authMsg.textContent = "Password must be at least 6 characters.";
    return;
  }

  const btn = document.getElementById("signupBtn");
  btn.disabled = true;
  btn.textContent = "Signing up...";

  try {
    const res  = await fetch(API + "/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (data.success) {
      authMsg.style.color = "green";
      authMsg.textContent = "Account created! You can now log in.";
    } else {
      authMsg.style.color = "#c0392b";
      authMsg.textContent = data.message || "Signup failed.";
    }
  } catch {
    authMsg.textContent = "Server error during signup.";
  } finally {
    btn.disabled = false;
    btn.textContent = "Signup";
  }
});

/* ── LOGOUT ── */
logoutBtn.addEventListener("click", () => {
  clearSession();
  location.reload();
});

/* ── ADD STUDENT ── */
document.getElementById("addBtn").addEventListener("click", async () => {
  const name   = document.getElementById("name").value.trim();
  const email  = document.getElementById("email").value.trim();
  const branch = document.getElementById("branch").value.trim();
  const phone  = document.getElementById("phone").value.trim();
  formMsg.textContent = "";

  if (!name || !email || !branch || !phone) {
    formMsg.textContent = "Please fill in all fields.";
    return;
  }

  const btn = document.getElementById("addBtn");
  btn.disabled = true;
  btn.textContent = "Adding...";

  try {
    const res  = await fetch(API + "/students", {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ name, email, branch, phone })
    });

    if (res.status === 401) {
      formMsg.textContent = "Session expired. Please log in again.";
      clearSession(); location.reload(); return;
    }

    const data = await res.json();
    if (data.success) {
      formMsg.style.color = "green";
      formMsg.textContent = "Student added ✅";
      document.getElementById("name").value   = "";
      document.getElementById("email").value  = "";
      document.getElementById("branch").value = "";
      document.getElementById("phone").value  = "";
      loadStudents();
    } else {
      formMsg.style.color = "#c0392b";
      formMsg.textContent = data.message || "Failed to add student.";
    }
  } catch {
    formMsg.style.color = "#c0392b";
    formMsg.textContent = "Server error.";
  } finally {
    btn.disabled = false;
    btn.textContent = "Add Student";
  }
});

/* ── LOAD / SEARCH STUDENTS ── */
let searchTimeout;
searchInput.addEventListener("input", () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(loadStudents, 300); // debounce
});

async function loadStudents() {
  const q = searchInput.value.trim();
  tableMsg.textContent = "Loading...";
  studentsBody.innerHTML = "";

  try {
    const url = API + "/students" + (q ? "?q=" + encodeURIComponent(q) : "");
    const res = await fetch(url, { headers: authHeaders() });

    if (res.status === 401) {
      clearSession(); location.reload(); return;
    }

    const data = await res.json();
    countEl.textContent = data.length;

    if (data.length === 0) {
      tableMsg.textContent = q ? "No students match your search." : "No students added yet.";
      return;
    }

    tableMsg.textContent = "";
    studentsBody.innerHTML = data.map(s => `
      <tr>
        <td>${escHtml(s.name)}</td>
        <td>${escHtml(s.email)}</td>
        <td>${escHtml(s.branch)}</td>
        <td>${escHtml(s.phone)}</td>
        <td>${new Date(s.created_at).toLocaleDateString()}</td>
        <td><button class="delete-btn" onclick="deleteStudent(${s.id})">Delete</button></td>
      </tr>`).join("");
  } catch {
    tableMsg.textContent = "Failed to load students.";
  }
}

/* ── DELETE STUDENT ── */
async function deleteStudent(id) {
  if (!confirm("Delete this student?")) return;
  try {
    const res = await fetch(API + "/students/" + id, {
      method: "DELETE",
      headers: authHeaders()
    });
    if (res.status === 401) { clearSession(); location.reload(); return; }
    loadStudents();
  } catch {
    alert("Failed to delete. Please try again.");
  }
}

/* ── XSS PROTECTION ── */
function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
</script>

</body>
</html>
